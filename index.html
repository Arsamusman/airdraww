<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Canvas - Neon Glow</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* Canvas layers */
        #canvas-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #paintCanvas {
            z-index: 2;
        }
        #webcam {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 240px;
            height: 180px;
            transform: scaleX(-1); /* Mirror webcam */
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            z-index: 3;
            object-fit: cover;
            background: #000;
        }
        /* UI Control Panel */
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 24px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 20px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
        }
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            background: transparent;
        }
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: 2px solid #fff;
            border-radius: 50%;
        }
        input[type="range"] {
            accent-color: #00ffcc;
            cursor: pointer;
        }
        /* Status HUD */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            pointer-events: none;
            line-height: 1.5;
            border-left: 4px solid #00ffcc;
        }
        .active-mode {
            font-weight: bold;
            color: #00ffcc;
            text-shadow: 0 0 8px #00ffcc;
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <canvas id="paintCanvas"></canvas>
        <video id="webcam" autoplay playsinline></video>
    </div>

    <div id="ui-panel">
        <div class="control-group">
            <label for="colorPicker">Color</label>
            <input type="color" id="colorPicker" value="#00ffcc">
        </div>
        <div class="control-group">
            <label for="brushSize">Size</label>
            <input type="range" id="brushSize" min="5" max="50" value="15">
            <span id="sizeValue">15px</span>
        </div>
    </div>

    <div id="hud">
        <h3>Air Canvas Controls</h3>
        <hr style="margin: 8px 0; border-color: rgba(255,255,255,0.1);">
        <div>☝️ 1 Finger: <span id="mode-draw">Draw</span></div>
        <div>✋ Open Palm: <span id="mode-erase">Erase (Pro)</span></div>
        <div>✊ Closed Fist: <span id="mode-pause">Pause</span></div>
        <div>✌️ 2 Fingers: <span id="mode-move">Move Dashboard</span></div>
        <hr style="margin: 8px 0; border-color: rgba(255,255,255,0.1);">
        <div>Current Action: <span id="current-state" class="active-mode">Initializing...</span></div>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('paintCanvas');
        const canvasCtx = canvasElement.getContext('2d');
        
        // UI Elements
        const colorPicker = document.getElementById('colorPicker');
        const brushSize = document.getElementById('brushSize');
        const sizeValue = document.getElementById('sizeValue');
        const uiPanel = document.getElementById('ui-panel');
        
        const stateHUD = document.getElementById('current-state');
        const modes = {
            draw: document.getElementById('mode-draw'),
            erase: document.getElementById('mode-erase'),
            pause: document.getElementById('mode-pause'),
            move: document.getElementById('mode-move')
        };

        // Application State
        let lastX = null;
        let lastY = null;
        let isDrawing = false;
        let panelX = window.innerWidth / 2;
        let panelY = 40;

        // Sync Canvas Size
        function resizeCanvas() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
            // Redraw background dark state
            canvasCtx.fillStyle = '#111';
            canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // UI Event Listeners
        brushSize.addEventListener('input', (e) => {
            sizeValue.textContent = `${e.target.value}px`;
        });

        // Helper to update HUD highlights
        function updateHUD(activeModeName, statusText) {
            stateHUD.textContent = statusText;
            Object.keys(modes).forEach(mode => {
                if (mode === activeModeName) {
                    modes[mode].classList.add('active-mode');
                } else {
                    modes[mode].classList.remove('active-mode');
                }
            });
        }

        // Distance formula helper
        function getDistance(pt1, pt2) {
            return Math.hypot(pt1.x - pt2.x, pt1.y - pt2.y);
        }

        // Process MediaPipe Hand Landmarks
        function onResults(results) {
            // If no hands detected, reset tracking and exit
            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                lastX = null;
                lastY = null;
                updateHUD('', 'No Hand Detected');
                return;
            }

            const landmarks = results.multiHandLandmarks[0];

            // Extract core finger tips & bases for gesture logic
            const wrist = landmarks[0];
            const indexTip = landmarks[8];
            const indexPip = landmarks[6];
            const middleTip = landmarks[12];
            const middlePip = landmarks[10];
            const ringTip = landmarks[16];
            const pinkyTip = landmarks[20];

            // Convert normalized MediaPipe coordinates to screen space (mirrored horizontally)
            const cursorX = (1 - indexTip.x) * canvasElement.width;
            const cursorY = indexTip.y * canvasElement.height;

            // Determine if individual fingers are extended
            const isIndexExtended = indexTip.y < indexPip.y;
            const isMiddleExtended = middleTip.y < middlePip.y;
            const isRingExtended = ringTip.y < landmarks[14].y;
            const isPinkyExtended = pinkyTip.y < landmarks[18].y;

            // --- GESTURE ENGINE ---
            let currentGesture = 'pause';

            if (isIndexExtended && !isMiddleExtended && !isRingExtended && !isPinkyExtended) {
                currentGesture = 'draw';
            } else if (isIndexExtended && isMiddleExtended && !isRingExtended && !isPinkyExtended) {
                currentGesture = 'move';
            } else if (isIndexExtended && isMiddleExtended && isRingExtended && isPinkyExtended) {
                currentGesture = 'erase';
            } else if (!isIndexExtended && !isMiddleExtended && !isRingExtended && !isPinkyExtended) {
                currentGesture = 'pause';
            }

            // --- EXECUTE ACTIONS BASED ON GESTURE ---
            if (currentGesture === 'draw') {
                updateHUD('draw', 'Drawing');
                
                canvasCtx.beginPath();
                canvasCtx.globalCompositeOperation = 'source-over';
                
                // Set Neon Glow styles
                canvasCtx.strokeStyle = colorPicker.value;
                canvasCtx.lineWidth = brushSize.value;
                canvasCtx.lineCap = 'round';
                canvasCtx.lineJoin = 'round';
                
                // Glow layers simulation
                canvasCtx.shadowBlur = brushSize.value * 0.8;
                canvasCtx.shadowColor = colorPicker.value;

                if (lastX !== null && lastY !== null) {
                    canvasCtx.moveTo(lastX, lastY);
                    canvasCtx.lineTo(cursorX, cursorY);
                    canvasCtx.stroke();
                }
                
                lastX = cursorX;
                lastY = cursorY;

            } else if (currentGesture === 'erase') {
                updateHUD('erase', 'Eraser Mode');
                
                canvasCtx.beginPath();
                // "destination-out" effectively deletes paint data returning it to canvas base background
                canvasCtx.globalCompositeOperation = 'destination-out'; 
                canvasCtx.lineWidth = brushSize.value * 3; // Professional wide eraser
                canvasCtx.lineCap = 'round';
                canvasCtx.lineJoin = 'round';
                canvasCtx.shadowBlur = 0; // Turn off glow for cleanly cutting away shapes

                if (lastX !== null && lastY !== null) {
                    canvasCtx.moveTo(lastX, lastY);
                    canvasCtx.lineTo(cursorX, cursorY);
                    canvasCtx.stroke();
                }

                lastX = cursorX;
                lastY = cursorY;

            } else if (currentGesture === 'move') {
                updateHUD('move', 'Moving Dashboard');
                // Center the UI panel smoothly where your two fingers are leading
                panelX = cursorX;
                panelY = cursorY;
                
                uiPanel.style.left = `${panelX}px`;
                uiPanel.style.top = `${panelY}px`;
                uiPanel.style.transform = 'translate(-50%, -50%)'; // Snap directly to index tip tracking

                // Break drawing path lines
                lastX = null;
                lastY = null;

            } else if (currentGesture === 'pause') {
                updateHUD('pause', 'Paused (Fist Locked)');
                // Reset lines so jumping back into drawing doesn't create unwanted straight vectors
                lastX = null;
                lastY = null;
            }
        }

        // Initialize MediaPipe Hands
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults(onResults);

        // Start Webcam stream and pipe frames to MediaPipe
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 640,
            height: 480
        });
        
        camera.start()
            .then(() => {
                stateHUD.textContent = "Ready! Show your hand.";
            })
            .catch(err => {
                stateHUD.textContent = "Webcam error!";
                console.error(err);
            });
    </script>
</body>
</html>
