<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Air Canvas</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #controls {
            position: absolute;
            top: 15px;
            z-index: 10;
            background: rgba(30, 30, 30, 0.75);
            backdrop-filter: blur(10px);
            padding: 12px 25px;
            border-radius: 30px;
            display: flex;
            gap: 20px;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ccc;
        }

        input[type="color"] {
            border: none;
            background: none;
            width: 35px;
            height: 35px;
            cursor: pointer;
        }

        input[type="range"] {
            cursor: pointer;
            accent-color: #00ffcc;
        }

        #status {
            font-weight: bold;
            color: #00ffcc;
            text-shadow: 0 0 8px rgba(0,255,204,0.6);
            min-width: 140px;
            text-align: center;
        }

        #canvas-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* Canvas layered on top of flipped webcam */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        video {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 200px;
            height: 150px;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror view */
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.2);
            z-index: 5;
            background: #000;
        }

        /* Quick Guide Overlay */
        #guide {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0,0,0,0.6);
            padding: 15px;
            border-radius: 10px;
            font-size: 0.85rem;
            line-height: 1.5;
            z-index: 10;
            pointer-events: none;
            border-left: 4px solid #00ffcc;
        }
        #guide ul { margin: 5px 0 0 0; padding-left: 20px; }
    </style>
</head>
<body>

    <div id="controls">
        <div class="control-group">
            <label for="colorPicker">Color</label>
            <input type="color" id="colorPicker" value="#00ffcc">
        </div>
        <div class="control-group">
            <label for="brushSize">Size</label>
            <input type="range" id="brushSize" min="5" max="40" value="15">
        </div>
        <div id="status">Initializing...</div>
    </div>

    <div id="guide">
        <strong>Gestures Guide:</strong>
        <ul>
            <li>👆 <strong>1 Finger (Index):</strong> Glow Draw</li>
            <li>🖐️ <strong>Open Palm:</strong> Eraser Mode</li>
            <li>✊ <strong>Closed Fist:</strong> Pause / Idle</li>
            <li>✌️ <strong>2 Fingers:</strong> Move / Pan Canvas</li>
        </ul>
    </div>

    <div id="canvas-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="paintCanvas"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('paintCanvas');
        const ctx = canvasElement.getContext('2d');
        const statusDiv = document.getElementById('status');
        const colorPicker = document.getElementById('colorPicker');
        const brushSizeSlider = document.getElementById('brushSize');

        // Drawing state Variables
        let paths = []; // Stores all drawn lines/strokes
        let currentPath = null;
        let isMovingMode = false;
        let lastMovePoint = null;
        
        // Canvas Translation offsets for the "2-finger Move" feature
        let offsetX = 0;
        let offsetY = 0;

        // Resize Canvas dynamically
        function resizeCanvas() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
            redrawCanvas();
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Render everything on the dark canvas
        function redrawCanvas() {
            // Dark Background
            ctx.fillStyle = '#121212';
            ctx.fillRect(0, 0, canvasElement.width, canvasElement.height);

            ctx.save();
            ctx.translate(offsetX, offsetY); // Apply panning offset

            // Draw all saved paths
            paths.forEach(path => {
                if (path.points.length < 2) return;
                
                ctx.beginPath();
                ctx.moveTo(path.points[0].x, path.points[0].y);
                for (let i = 1; i < path.points.length; i++) {
                    ctx.lineTo(path.points[i].x, path.points[i].y);
                }
                
                ctx.lineWidth = path.size;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                if (path.isEraser) {
                    // Eraser cuts out back to background color
                    ctx.strokeStyle = '#121212';
                    ctx.shadowBlur = 0;
                } else {
                    // Neon Glow Effect
                    ctx.strokeStyle = path.color;
                    ctx.shadowColor = path.color;
                    ctx.shadowBlur = path.size * 0.8;
                }
                ctx.stroke();
            });

            ctx.restore();
        }

        // Helper to check if a finger is extended
        function isFingerExtended(tip, pip, mcp) {
            return tip.y < pip.y && pip.y < mcp.y; 
        }

        // Process MediaPipe Hand Results
        function onResults(results) {
            statusDiv.innerText = "Hand Not Detected";
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // Get Key Landmark Coordinates (Mirrored X to match natural user movement)
                const indexTip = { x: (1 - landmarks[8].x) * canvasElement.width, y: landmarks[8].y * canvasElement.height };
                const indexPip = landmarks[7];
                const indexMcp = landmarks[5];
                
                const middleTip = landmarks[12];
                const middlePip = landmarks[11];
                const middleMcp = landmarks[9];

                const ringTip = landmarks[16];
                const pinkyTip = landmarks[20];
                const wrist = landmarks[0];

                // Detect extended state for each finger
                const indexExtended = isFingerExtended(landmarks[8], landmarks[6], landmarks[5]);
                const middleExtended = isFingerExtended(landmarks[12], landmarks[10], landmarks[9]);
                const ringExtended = isFingerExtended(landmarks[16], landmarks[14], landmarks[13]);
                const pinkyExtended = isFingerExtended(landmarks[20], landmarks[18], landmarks[17]);

                // Adjust tip coordinates to account for global canvas pan/offset
                const adjustedTip = {
                    x: indexTip.x - offsetX,
                    y: indexTip.y - offsetY
                };

                // --- GESTURE LOGIC ---
                
                // 1. TWO FINGERS EXTENDED = MOVE MODE
                if (indexExtended && middleExtended && !ringExtended && !pinkyExtended) {
                    statusDiv.innerText = "Mode: Moving Canvas";
                    statusDiv.style.color = "#ffcc00";
                    statusDiv.style.textShadow = "0 0 8px rgba(255,204,0,0.6)";
                    
                    currentPath = null; // Close active drawing line
                    
                    if (!isMovingMode) {
                        isMovingMode = true;
                        lastMovePoint = indexTip;
                    } else {
                        // Drag the entire scene relative to tracking speed
                        offsetX += (indexTip.x - lastMovePoint.x);
                        offsetY += (indexTip.y - lastMovePoint.y);
                        lastMovePoint = indexTip;
                    }
                } 
                // 2. ONLY INDEX FINGER = DRAW MODE
                else if (indexExtended && !middleExtended && !ringExtended && !pinkyExtended) {
                    statusDiv.innerText = "Mode: Drawing";
                    statusDiv.style.color = "#00ffcc";
                    statusDiv.style.textShadow = "0 0 8px rgba(0,255,204,0.6)";
                    isMovingMode = false;

                    if (!currentPath || currentPath.isEraser) {
                        currentPath = {
                            color: colorPicker.value,
                            size: parseInt(brushSizeSlider.value),
                            isEraser: false,
                            points: [adjustedTip]
                        };
                        paths.push(currentPath);
                    } else {
                        currentPath.points.push(adjustedTip);
                    }
                } 
                // 3. ALL FINGERS EXTENDED = ERASER MODE
                else if (indexExtended && middleExtended && ringExtended && pinkyExtended) {
                    statusDiv.innerText = "Mode: Erasing";
                    statusDiv.style.color = "#ff3366";
                    statusDiv.style.textShadow = "0 0 8px rgba(255,51,102,0.6)";
                    isMovingMode = false;

                    if (!currentPath || !currentPath.isEraser) {
                        currentPath = {
                            color: '#121212',
                            size: parseInt(brushSizeSlider.value) * 2, // Bigger eraser radius
                            isEraser: true,
                            points: [adjustedTip]
                        };
                        paths.push(currentPath);
                    } else {
                        currentPath.points.push(adjustedTip);
                    }
                } 
                // 4. CLOSED FIST / OTHER = PAUSE MODE
                else {
                    statusDiv.innerText = "Mode: Paused";
                    statusDiv.style.color = "#aaaaaa";
                    statusDiv.style.textShadow = "none";
                    isMovingMode = false;
                    currentPath = null;
                }
            } else {
                isMovingMode = false;
                currentPath = null;
            }

            // Render updated paths framework
            redrawCanvas();
        }

        // Configure MediaPipe Hands Pipeline
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults(onResults);

        // Fire up browser camera feed wrapper
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 640,
            height: 480
        });
        
        camera.start()
            .then(() => statusDiv.innerText = "Ready! Show hand")
            .catch(err => {
                statusDiv.innerText = "Camera Error";
                console.error(err);
            });
    </script>
</body>
</html>
